<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#7ED957"/>
  
  <!-- Golf player (red/pink) -->
  <g fill="#E91E63" transform="translate(30, 50)">
    <ellipse cx="15" cy="10" rx="6" ry="8"/>
    <path d="M 15 18 L 15 40 M 15 25 L 5 35 M 15 25 L 25 35 M 15 40 L 5 60 M 15 40 L 25 60" stroke="#E91E63" stroke-width="3" fill="none"/>
    <line x1="7" y1="35" x2="2" y2="15" stroke="#E91E63" stroke-width="2"/>
    <circle cx="2" cy="12" r="3" fill="#E91E63"/>
    <circle cx="10" cy="105" r="6" fill="#E91E63"/>
  </g>
  
  <!-- Soccer player (blue) -->
  <g fill="#2196F3" transform="translate(110, 45)">
    <ellipse cx="15" cy="10" rx="6" ry="8"/>
    <path d="M 15 18 L 15 40 M 15 25 L 7 32 M 15 25 L 25 37 M 15 40 L 5 60 M 15 40 L 25 60" stroke="#2196F3" stroke-width="3" fill="none"/>
    <circle cx="15" cy="110" r="10" fill="#2196F3"/>
  </g>
  
  <!-- Badminton player (purple) -->
  <g fill="#9C27B0" transform="translate(200, 48)">
    <ellipse cx="15" cy="10" rx="6" ry="8"/>
    <path d="M 15 18 L 15 40 M 15 25 L 3 20 M 15 25 L 35 15 M 15 40 L 5 60 M 15 40 L 30 60" stroke="#9C27B0" stroke-width="3" fill="none"/>
    <line x1="35" y1="15" x2="42" y2="8" stroke="#9C27B0" stroke-width="2.5"/>
    <ellipse cx="46" cy="4" rx="6" ry="9" fill="none" stroke="#9C27B0" stroke-width="2"/>
  </g>
</svg>