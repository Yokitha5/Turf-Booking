<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e8f58"/>
      <stop offset="100%" stop-color="#0a3d26"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ca96b"/>
      <stop offset="100%" stop-color="#167446"/>
    </linearGradient>
    <clipPath id="badge">
      <rect width="200" height="200" rx="38"/>
    </clipPath>
  </defs>

  <!-- Badge background -->
  <rect width="200" height="200" rx="38" fill="url(#bg)"/>

  <!-- Turf alternating stripes -->
  <rect x="0"   y="0" width="29" height="200" fill="white" opacity="0.04" clip-path="url(#badge)"/>
  <rect x="58"  y="0" width="29" height="200" fill="white" opacity="0.04" clip-path="url(#badge)"/>
  <rect x="116" y="0" width="29" height="200" fill="white" opacity="0.04" clip-path="url(#badge)"/>
  <rect x="174" y="0" width="26" height="200" fill="white" opacity="0.04" clip-path="url(#badge)"/>

  <!-- ── FIELD TOP-DOWN VIEW ── -->
  <!-- Field pitch surface -->
  <rect x="18" y="46" width="164" height="108" rx="5" fill="url(#fieldGrad)" opacity="0.55"/>

  <!-- Field outline -->
  <rect x="18" y="46" width="164" height="108" rx="5" fill="none" stroke="white" stroke-width="3" opacity="0.92"/>

  <!-- Halfway line -->
  <line x1="100" y1="46" x2="100" y2="154" stroke="white" stroke-width="2" opacity="0.85"/>

  <!-- Left penalty area -->
  <rect x="18" y="70" width="30" height="60" fill="none" stroke="white" stroke-width="1.8" opacity="0.85"/>

  <!-- Right penalty area -->
  <rect x="152" y="70" width="30" height="60" fill="none" stroke="white" stroke-width="1.8" opacity="0.85"/>

  <!-- Left goal -->
  <rect x="10" y="88" width="9" height="24" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>

  <!-- Right goal -->
  <rect x="181" y="88" width="9" height="24" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>

  <!-- Left penalty spot -->
  <circle cx="57" cy="100" r="2.5" fill="white" opacity="0.85"/>

  <!-- Right penalty spot -->
  <circle cx="143" cy="100" r="2.5" fill="white" opacity="0.85"/>

  <!-- Corner arcs (quarter circles) -->
  <path d="M18 56 Q24 46 34 46"  fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <path d="M166 46 Q176 46 182 56" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <path d="M18 144 Q24 154 34 154" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <path d="M166 154 Q176 154 182 144" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>

  <!-- ── CENTER CIRCLE doubles as a CLOCK FACE ── -->
  <!-- Circle ring -->
  <circle cx="100" cy="100" r="22" fill="#0a3d26" fill-opacity="0.55" stroke="white" stroke-width="2.5" opacity="0.95"/>

  <!-- Clock hour marks (4 ticks at 12/3/6/9) -->
  <line x1="100" y1="80"  x2="100" y2="84"  stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="120" y1="100" x2="116" y2="100" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="100" y1="120" x2="100" y2="116" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="80"  y1="100" x2="84"  y2="100" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Hour hand (~10 o'clock) -->
  <line x1="100" y1="100" x2="92"  y2="89"  stroke="white" stroke-width="3"   stroke-linecap="round" opacity="0.95"/>
  <!-- Minute hand (~2 o'clock) -->
  <line x1="100" y1="100" x2="113" y2="92"  stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>

  <!-- Center cap -->
  <circle cx="100" cy="100" r="3.5" fill="white" opacity="0.95"/>

  <!-- ── ACCENT RING ── -->
  <rect width="200" height="200" rx="38" fill="none" stroke="#4dc484" stroke-width="3" opacity="0.55"/>
</svg>